<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA logo" class="logo logo--worm" />
      <div class="site-header__text">
        <h1>Space Explorer</h1>
        <p class="subtitle">Mission Control: NASA APOD Gallery</p>
      </div>
    </header>

    <div class="filters" aria-label="Date range filters">
      <input type="date" id="startDate" aria-label="Start date" />
      <input type="date" id="endDate" aria-label="End date" />
      <button type="button">Get Space Images</button>
    </div>

    <div id="gallery" class="gallery" aria-live="polite">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <h3>Ready for launch</h3>
        <p>Select a date range and click "Get Space Images" to explore the cosmos.</p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
